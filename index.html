<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HydroTech</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#02050a;
  font-family:'Space Grotesk',sans-serif;
  overflow:hidden;
}

#landing{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

#bg-glow {
  position: absolute;
  width: 80vw;
  height: 80vw;
  max-width: 800px;
  max-height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(140, 80, 255, 0.1) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1;
}

.brand{
  position:relative;z-index:10;
  font-size:clamp(48px,8vw,80px);
  font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#f9a8d4 50%,#7dd3fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-2px;line-height:1;
  animation:fadeD 1s ease both;
  margin-bottom: 30px;
}

.orb-scene{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  animation:fadeU 1.2s ease .3s both;
}

.orb-wrap{
  position:relative;
  width:clamp(200px,30vw,360px);
  height:clamp(200px,30vw,360px);
  cursor:pointer;
  transition:transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  align-items: center;
  justify-content: center;
}
.orb-wrap:hover{transform:scale(1.04);}
.orb-wrap:active{transform:scale(0.96);}

.orb {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, #050014 0%, #000 100%);
  box-shadow: 
    0 0 60px 10px rgba(180, 100, 255, 0.3),
    inset 25px 0 60px rgba(100, 200, 255, 0.8),
    inset -25px 0 60px rgba(255, 100, 200, 0.8),
    inset 0 25px 60px rgba(255, 150, 200, 0.5),
    inset 0 -25px 60px rgba(100, 200, 255, 0.5);
  overflow: hidden;
  animation: floatOrb 6s ease-in-out infinite;
}

.orb-core {
  position: absolute;
  top: -10%; left: -10%; right: -10%; bottom: -10%;
  border-radius: 50%;
  background: 
    radial-gradient(circle at 35% 65%, rgba(150, 220, 255, 0.9) 0%, transparent 45%),
    radial-gradient(circle at 65% 35%, rgba(255, 150, 220, 0.9) 0%, transparent 45%);
  filter: blur(25px);
  mix-blend-mode: screen;
  animation: morphCore 10s ease-in-out infinite alternate;
}

.orb-sharp-light {
  position: absolute;
  top: 40%; left: 25%; right: 25%; bottom: 40%;
  border-radius: 50%;
  background: #fff;
  filter: blur(10px);
  transform: rotate(-30deg);
  opacity: 0.8;
  mix-blend-mode: overlay;
  animation: pulseSharp 5s ease-in-out infinite alternate;
}

.orb-darkness {
  position: absolute;
  top: 25%; left: 15%;
  width: 45%; height: 45%;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.95);
  filter: blur(20px);
  animation: floatDark 8s ease-in-out infinite alternate;
}

.ring1 {
  position:absolute;top:-15px;left:-15px;right:-15px;bottom:-15px;
  border-radius:50%;
  border: 1.5px solid transparent;
  border-top-color: rgba(100, 200, 255, 0.4);
  border-bottom-color: rgba(255, 100, 200, 0.4);
  animation:spinR 16s linear infinite;
  pointer-events:none;
}
.ring2 {
  position:absolute;top:-30px;left:-30px;right:-30px;bottom:-30px;
  border-radius:50%;
  border: 1px dashed rgba(150, 200, 255, 0.2);
  animation:spinL 24s linear infinite;
  pointer-events:none;
}

.hint{
  margin-top:40px;
  font-size:12px;color:rgba(200,220,255,.7);
  letter-spacing:4px;text-transform:uppercase;
  transition:opacity .4s;
  animation:blink 2.5s ease-in-out infinite, fadeU 1.3s ease .5s both;
}

.vbar{
  display:flex;align-items:flex-end;gap:4px;
  height:32px;margin-top:14px;
  opacity:0;transition:opacity .4s;
}
.vbar.active{opacity:1;}
.vbar span{
  width:5px;border-radius:3px;height:4px;
  background:linear-gradient(180deg,#f472b6,#38bdf8);
}
.vbar.active span:nth-child(1){animation:bar .60s ease-in-out infinite alternate;}
.vbar.active span:nth-child(2){animation:bar .50s ease-in-out .10s infinite alternate;}
.vbar.active span:nth-child(3){animation:bar .70s ease-in-out .05s infinite alternate;}
.vbar.active span:nth-child(4){animation:bar .40s ease-in-out .15s infinite alternate;}
.vbar.active span:nth-child(5){animation:bar .65s ease-in-out .08s infinite alternate;}

/* fade-out transition */
#landing.fade-out{
  animation:fadeOut .8s ease forwards;
}

@keyframes fadeD{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:none;}}
@keyframes fadeU{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:none;}}
@keyframes floatOrb{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
@keyframes morphCore {
  0% { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.1) rotate(60deg); }
}
@keyframes pulseSharp {
  0% { transform: rotate(-30deg) scaleX(0.9) scaleY(0.8); opacity: 0.6; }
  100% { transform: rotate(-10deg) scaleX(1.2) scaleY(1.1); opacity: 0.9; }
}
@keyframes floatDark {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(25px, 20px) scale(1.1); }
}
@keyframes spinR{to{transform:rotate(360deg);}}
@keyframes spinL{to{transform:rotate(-360deg);}}
@keyframes blink{0%,100%{opacity:.4;}50%{opacity:1;}}
@keyframes bar{from{height:4px;}to{height:26px;}}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
</style>
</head>
<body>

<div id="landing">
  <div id="bg-glow"></div>

  <div class="brand">HydroTech</div>

  <div class="orb-scene">
    <div class="orb-wrap" id="orbBtn">
      <div class="ring2"></div>
      <div class="ring1"></div>
      <div class="orb">
        <div class="orb-core"></div>
        <div class="orb-sharp-light"></div>
        <div class="orb-darkness"></div>
      </div>
    </div>
    <div class="hint" id="hint">Click Orb to Launch</div>
    <div class="vbar" id="vbar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
(function(){
  /* ── Voice ── */
  function speakWelcome(cb){
    var vbar=document.getElementById('vbar');
    var hint=document.getElementById('hint');
    hint.style.opacity='0';
    vbar.classList.add('active');
    if(!window.speechSynthesis){cb();return;}
    var u=new SpeechSynthesisUtterance('Welcome to HydroTech');
    u.pitch=1.15;u.rate=.88;u.volume=1;
    function setVoice(){
      var voices=window.speechSynthesis.getVoices();
      var f=voices.find(function(v){
        return /samantha|zira|susan|victoria|karen|moira|fiona|tessa|veena|allison|ava|serena|female/i.test(v.name);
      })||voices.find(function(v){return /en/i.test(v.lang);})||voices[0];
      if(f)u.voice=f;
    }
    setVoice();
    if(!window.speechSynthesis.getVoices().length){
      window.speechSynthesis.onvoiceschanged=setVoice;
    }
    u.onend=function(){vbar.classList.remove('active');cb();};
    window.speechSynthesis.speak(u);
  }

  /* ── Click ── */
  document.getElementById('orbBtn').addEventListener('click',function(){
    speakWelcome(function(){
      document.getElementById('landing').classList.add('fade-out');
      setTimeout(function(){
        /* ---- CHANGE THIS URL to your Gradio share link or localhost ---- */
        window.location.href='http://127.0.0.1:7860';
      },700);
    });
  });

})();
</script>
</body>
</html>
